<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stylette — Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #FBF7F5; color: #1C1510; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 480px; padding: 48px 24px; text-align: center; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }

    .links { display: flex; flex-direction: column; gap: 12px; }
    a { display: block; padding: 16px 24px; background: #fff; border: 1px solid #EDE5E0; border-radius: 12px; text-decoration: none; color: #1C1510; font-size: 16px; font-weight: 500; transition: border-color 0.15s; }
    a:hover { border-color: #F4674A; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Stylette</h1>
    <p>Legal documents for the Stylette app</p>
    <div class="links">
      <a href="/stylette-legal/privacy">Privacy Policy</a>

    </div>
  </div>

</html>
